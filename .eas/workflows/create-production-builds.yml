name: Build and submit production for all platforms

on:
  push:
    branches: ['main']

jobs:
  build_android:
    name: Build Android
    type: build
    params:
      platform: android
      profile: production

  build_ios:
    name: Build iOS
    type: build
    params:
      platform: ios
      profile: production

  submit_android:
    name: Submit Android to Play Store
    needs: [build_android]
    type: submit
    env:
      EXPO_DEBUG: '1'
    params:
      platform: android
      profile: production
      build_id: ${{ needs.build_android.outputs.build_id }}

  submit_ios:
    name: Submit iOS to App Store
    needs: [build_ios]
    type: submit
    env:
      EXPO_DEBUG: '1'
    params:
      platform: ios
      profile: production
      build_id: ${{ needs.build_ios.outputs.build_id }}
