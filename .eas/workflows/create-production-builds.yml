name: Build production for all platforms

# Manual-only: run with `eas workflow:run .eas/workflows/create-production-builds.yml`.
# Intentionally has no `on:` trigger so merges/pushes to main do NOT start a build.

jobs:
  build_android:
    name: Build Android
    type: build
    params:
      platform: android
      profile: production

  build_ios:
    name: Build iOS
    type: build
    params:
      platform: ios
      profile: production
